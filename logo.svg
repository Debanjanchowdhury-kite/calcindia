<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" fill="none">
  <!-- Calculator icon -->
  <rect x="0" y="4" width="32" height="32" rx="8" fill="url(#grad)"/>
  <rect x="6" y="10" width="20" height="6" rx="2" fill="white" opacity="0.9"/>
  <rect x="6" y="20" width="8" height="8" rx="2" fill="white" opacity="0.75"/>
  <rect x="16" y="20" width="4" height="8" rx="2" fill="white" opacity="0.75"/>
  <rect x="22" y="20" width="4" height="8" rx="2" fill="white" opacity="0.75"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>
  <!-- Text: Indi -->
  <text x="40" y="28" font-family="Nunito, sans-serif" font-weight="900" font-size="22" fill="#1E2235">Indi</text>
  <!-- Text: Calculator -->
  <text x="80" y="28" font-family="Nunito, sans-serif" font-weight="900" font-size="22" fill="#0D9488">Calculator</text>
</svg>
